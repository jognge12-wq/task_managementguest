async function saveBulkDates(propName) {
  const rows = document.querySelectorAll('#modal-box .bdate-row[data-id]');
  const updates = [];
  rows.forEach(row => {
    const id   = row.dataset.id;
    const date = document.getElementById('bd-d-' + id)?.value || '';
    const time = document.getElementById('bd-t-' + id)?.value || '';
    updates.push({ id, date, time });
  });

  closeModal();
  showToast('保存中…');
  try {
    await Promise.all(updates.map(u =>
      api({ mode:'updatePhase', id:u.id, date:u.date, time:u.time })
    ));
    // ローカルにも反映
    updates.forEach(u => {
      const ph = phaseData.find(p => p.id === u.id);
      if (ph) { ph.date = u.date; ph.time = u.time; }
    });
    renderAll();
    showToast('日程を保存しました');
  } catch(e) {
    showToast('エラー: ' + e.message);
    loadAll(); // 失敗時は再取得
  }
}

function fmtDateShort(d) {
  if (!d) return '';
  const m = String(d).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return '';
  return `${Number(m[2])}/${Number(m[3])}`;
}

function fmtDateFull(d) {
  if (!d) return '';
  const m = String(d).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return '';
  const dt = new Date(Number(m[1]), Number(m[2])-1, Number(m[3]));
  const dow = ['日','月','火','水','木','金','土'][dt.getDay()];
  return `${Number(m[2])}月${Number(m[3])}日(${dow})`;
}

function statusPillClass(st) {
  const map = { warn:'sp-warn', today:'sp-today', overdue:'sp-overdue', soon:'sp-soon', ok:'sp-ok', done:'sp-done', nodate:'sp-nodate' };
  return map[st] || 'sp-ok';
}

function statusPillLabel(st, diff) {
  if (st === 'overdue') return '期限超過';
  if (st === 'today')   return '本日';
  if (st === 'done')    return '完了';
  if (st === 'nodate')  return '未設定';
  if (diff !== null)    return `D-${diff}`;
  return '—';
}

  <button class="prop-add-btn" style="margin-top:8px" onclick="openAddPhaseModal('${esc(propName)}')">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    工程を追加
  </button>
  `;
}

function vPhaseCardHTML(ph) {
  const st = phaseStatus(ph);
  const tasks = taskData.filter(t => t.phase_id === ph.id);
  const done = tasks.filter(t => isBool(t.done)).length;
  const diff = dateDiff(ph.date);
  const isOverdue = st === 'overdue';
  const isUrgent = ['warn','today'].includes(st); // overdue は別扱い
  const isDone = st === 'done';

  // 全タスク完了 → コンパクト折り畳み表示
  const allDone = tasks.length > 0 && tasks.every(t => isBool(t.done));

  let dateStr = '';
  if (ph.date) {
    const [y,mo,d] = ph.date.split('-').map(Number);
    const dt = new Date(y, mo-1, d);
    const dow = ['日','月','火','水','木','金','土'][dt.getDay()];
    dateStr = `${mo}月${d}日(${dow})${ph.time && /^\d{1,2}:\d{2}$/.test(ph.time) ? ' ' + ph.time : ''}`;
  }

  if (allDone && !expandedPhases.has(ph.id)) {
    return `
    <div class="v-phase-card done-mini" onclick="togglePhaseExpand('${ph.id}')">
      <div class="v-mini-inner">
        <div class="v-mini-check">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20,6 9,17 4,12"/></svg>
        </div>
        <div class="v-mini-name">${esc(ph.name)}</div>
        <div class="v-mini-date">${dateStr}</div>
        <div class="v-mini-count">${done}/${tasks.length}</div>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--t3);flex-shrink:0"><polyline points="6,9 12,15 18,9"/></svg>
      </div>
    </div>`;
  }

  const colsHTML = ['prep','day','post'].map(col => {
    const colTasks = tasks.filter(t => t.col === col).sort((a,b) => Number(a.order)-Number(b.order));
    const colDone = colTasks.filter(t => isBool(t.done)).length;
    const label = {prep:'準備',day:'当日',post:'事後'}[col];
    const isDay = col === 'day';
    const taskItems = colTasks.map(t => {
      const d = isBool(t.done), p = isBool(t.priority);
      return `
      <div class="v-task" onclick="toggleTask('${t.id}')">
        <div class="v-task-chk${d?' done':p?' prio':''}">
          ${d ? '<svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20,6 9,17 4,12"/></svg>' : ''}
        </div>
        <div class="v-task-name${d?' done':''}">${esc(t.name)}${p&&!d?'<span class="v-prio-badge">優先</span>':''}</div>
      </div>`;
    }).join('');
    return `
    <div class="v-phase-col${isDay?' col-day':''}">
      <div class="v-phase-col-hdr">
        <span class="v-phase-col-label">${label}</span>
        <span class="v-phase-col-count">${colTasks.length ? colDone+'/'+colTasks.length : ''}</span>
      </div>
      <div class="v-phase-col-tasks">
        ${taskItems}
        <button class="v-add-task-btn" onclick="event.stopPropagation();openAddTaskModal('${ph.id}','${esc(ph.prop)}')">＋</button>
      </div>
    </div>`;
  }).join('');

  // overdueはpillなし（カード全体が赤）
  const pillHTML = isOverdue ? '' : `<span class="status-pill ${statusPillClass(st)}">${statusPillLabel(st, diff)}</span>`;
  // 全完了で展開中のカードは折り畳みボタンを出す
  const collapseBtn = allDone ? `
    <button class="v-phase-menu-btn" onclick="event.stopPropagation();togglePhaseExpand('${ph.id}')" title="折り畳む" style="margin-right:2px">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="18,15 12,9 6,15"/></svg>
    </button>` : '';

  return `
  <div class="v-phase-card${isOverdue?' overdue':isUrgent?' urgent':''}${allDone?' done-expanded':''}">
    <div class="v-phase-hdr${isOverdue?' overdue-bg':isUrgent?' urgent-bg':''}">
      <div class="v-phase-meta">
        <span class="v-phase-date${isOverdue?' overdue':isUrgent?' urgent':''}">${dateStr||'日付未設定'}</span>
        ${pillHTML}
      </div>
      <div class="v-phase-row">
        <div class="v-phase-name">${esc(ph.name)}</div>
        <div style="display:flex;align-items:center;gap:4px">
          <span class="v-phase-count">${done}/${tasks.length}</span>
          <button class="v-phase-menu-btn" onclick="openEditPhaseModal('${ph.id}')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/><circle cx="12" cy="19" r="1.5" fill="currentColor"/></svg>
          </button>
          ${collapseBtn}
        </div>
      </div>
    </div>
    <div class="v-phase-cols">${colsHTML}</div>
  </div>`;
}

function renderMoreScreen() {
  document.getElementById('app-screen').innerHTML = `
  <div class="more-screen">
    <div class="more-screen-title">その他</div>
    <p>設定・管理メニュー</p>
    <div class="more-action-list">
      <div class="more-action" onclick="openTmplPanel()">
        テンプレート設定
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg>
      </div>
      <div class="more-action" onclick="openAddPropModal()">
        物件を追加
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg>
      </div>
      <div class="more-action" onclick="openChangeKeyModal()">
        アクセスキー変更
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg>
      </div>
      <div class="more-action" style="color:var(--red)" onclick="doLogout()">
        ログアウト
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg>
      </div>
      <div class="more-action" style="color:var(--red)" onclick="doResetAll()">

        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg>
      </div>
    </div>
    <div style="margin-top:24px;font-size:11px;color:var(--t3)">現場タスク管理 v2</div>

}

// ── 起動 ──
init();
</script>
