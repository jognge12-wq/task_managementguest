<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>現場タスク管理 v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  /* 背景・サーフェス */
  --bg:       #F5F6F3;
  --card:     #FFFFFF;
  --border:   #E4E8E2;
  --border-s: #CBD3CA;

  /* テキスト */
  --t1: #0F1512;
  --t2: #525C56;
  --t3: #9BA8A1;

  /* アクセント（ブランドグリーン） */
  --accent:    #2F5D43;
  --accent-fg: #FFFFFF;
  --green:     #2F5D43;
  --green-m:   #2F5D43;
  --green-l:   #E8F0EA;

  /* 警告系 */
  --red:    #B54C3D;
  --red-l:  #FBECE8;
  --amber:  #B07A1E;
  --amber-l: #FAF1DD;

  /* 列カラー（極めてサブトル） */
  --prep-c:  #404040;  --prep-bg: #F5F5F4;
  --day-c:   #0F1512;  --day-bg:  #F9FAF7;
  --post-c:  #525C56;  --post-bg: #F9FAF7;

  --fp: 'Inter', -apple-system, system-ui, sans-serif;
  --fm: 'Inter', -apple-system, system-ui, sans-serif;
  --ease: cubic-bezier(.25,.46,.45,.94);
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--fp); background: var(--bg); color: var(--t1);
       -webkit-font-smoothing: antialiased; }
button { font-family: var(--fp); cursor: pointer; }

/* ── ログイン ── */
#login-wrap {
  min-height: 100svh; display: flex; align-items: center; justify-content: center;
  padding: 24px; position: relative; overflow: hidden;
  background: linear-gradient(145deg, #1a3a28 0%, #111b22 100%);
}
#login-wrap::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
  background-size: 40px 40px;
}
.login-card {
  background: white; border-radius: 24px; padding: 40px 32px;
  width: 100%; max-width: 380px;
  box-shadow: 0 32px 80px rgba(0,0,0,.45);
  position: relative; z-index: 1;
}
.login-logo {
  width: 52px; height: 52px; border-radius: 14px;
  background: var(--green-m); display: flex; align-items: center; justify-content: center;
  margin-bottom: 18px; box-shadow: 0 4px 16px rgba(47,93,67,.4);
}
.login-title  { font-size: 20px; font-weight: 800; margin-bottom: 3px; }
.login-sub    { font-size: 12px; color: var(--t2); margin-bottom: 28px; }
.login-field  { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.login-field label { font-size: 12px; font-weight: 600; color: var(--t2); }
.login-field input {
  width: 100%; padding: 11px 13px; border: 1.5px solid var(--border);
  border-radius: 10px; font-size: 15px; font-family: var(--fp);
  background: var(--bg); color: var(--t1); outline: none;
  transition: border-color .15s;
}
.login-field input:focus { border-color: var(--green-m); }
.btn-login {
  width: 100%; padding: 13px; border: none; border-radius: 10px;
  background: var(--green-m); color: white;
  font-size: 14px; font-weight: 700; letter-spacing: .03em;
  transition: opacity .15s; display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-login:active { opacity: .8; }
.btn-login:disabled { opacity: .6; cursor: not-allowed; }
.login-err { font-size: 12px; color: var(--red); text-align: center; margin-top: 10px; }
.spin {
  width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.4);
  border-top-color: white; border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── グローバルヘッダー ── */
.g-hdr {
  background: var(--card); border-bottom: 1px solid var(--border);
  height: 52px; display: flex; align-items: center;
  padding: 0 16px; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.g-hdr-title { font-size: 16px; font-weight: 700; }
.g-hdr-sub   { font-size: 11px; color: var(--t2); }
.btn-sm {
  display: flex; align-items: center; gap: 4px;
  padding: 7px 12px; border-radius: 8px; border: none;
  font-size: 12px; font-weight: 600;
}
.btn-primary { background: var(--green-m); color: white; }
.btn-ghost   { background: var(--card); color: var(--t2); border: 1px solid var(--border); }

/* ── モバイルタブ ── */
.mob-tabs { display: none; }

/* ── 物件ブロック ── */
.prop-block { border-bottom: 2px solid var(--border); }

.prop-label { padding: 10px 16px 10px; background: var(--bg); }
.prop-label-top { display: flex; align-items: center; gap: 10px; }
.prop-label-main { flex: 1; min-width: 0; }
.prop-label-name { font-size: 14px; font-weight: 700; }
.prop-city { font-size: 11px; font-weight: 400; color: var(--t2); }
.prop-label-right { margin-left: auto; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.warn-badge {
  font-size: 10px; font-weight: 700; padding: 2px 8px;
  border-radius: 6px; background: var(--red-l); color: var(--red);
}
.prog-wrap { display: flex; align-items: center; gap: 6px; }
.prog-bar  { width: 64px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.prog-fill { height: 100%; background: var(--green-m); border-radius: 2px; }
.prog-pct  { font-size: 11px; color: var(--t2); font-family: var(--fm); }

/* 重要日付（物件名横にインライン） */
.prop-dates-inline {
  display: flex; align-items: center; gap: 0;
  margin-top: 4px; overflow-x: auto; scrollbar-width: none; flex-wrap: nowrap;
}
.prop-dates-inline::-webkit-scrollbar { display: none; }
.pdi {
  display: flex; align-items: center; gap: 3px;
  padding-right: 9px; margin-right: 9px;
  border-right: 1px solid var(--border);
  white-space: nowrap; flex-shrink: 0;
}
.pdi:last-child { border-right: none; padding-right: 0; margin-right: 0; }
.pdi-key { font-size: 10px; color: var(--t3); font-weight: 600; }
.pdi-val { font-size: 11px; font-weight: 600; color: var(--t2); }
.pdi-val.hi { color: var(--red); }

/* 工程スクロール */
.phase-scroll {
  overflow-x: auto; padding: 10px 16px 16px;
  -webkit-overflow-scrolling: touch; scrollbar-width: none;
  display: flex; align-items: flex-start; gap: 0;
}
.phase-scroll::-webkit-scrollbar { display: none; }

/* 引渡し完了バナー */
.handover-banner {
  margin: 0 16px 12px; padding: 16px 18px;
  background: linear-gradient(135deg, var(--green-l), #f0f6f1);
  border: 1.5px solid var(--green-m); border-radius: 14px;
  display: flex; align-items: center; gap: 14px;
}
.handover-banner-icon { font-size: 28px; flex-shrink: 0; line-height: 1; }
.handover-banner-text { flex: 1; }
.handover-banner-title { font-size: 14px; font-weight: 700; color: var(--green-m); }
.handover-banner-sub   { font-size: 11px; color: var(--t2); margin-top: 2px; }
.btn-delete-prop {
  padding: 8px 14px; border-radius: 9px; border: none;
  background: var(--red-l); color: var(--red);
  font-size: 12px; font-weight: 700; flex-shrink: 0; white-space: nowrap;
  transition: background .15s;
}
.btn-delete-prop:hover { background: var(--red); color: white; }

/* 完了工程トグル */
.done-toggle {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; color: var(--t3); background: none; border: none;
  padding: 4px 0 8px 16px;
}
.done-toggle:hover { color: var(--t2); }

/* コネクター */
.conn { display: flex; align-items: flex-start; padding-top: 36px; flex-shrink: 0; }
.conn-line {
  width: 20px; height: 2px; background: var(--border);
  position: relative; flex-shrink: 0;
}
.conn-line::after {
  content: ''; position: absolute; right: -5px; top: -4px;
  border: 5px solid transparent; border-left-color: var(--border);
}
.conn-line.warn { background: var(--red); }
.conn-line.warn::after { border-left-color: var(--red); }

/* ── 工程カード ── */
.ph {
  flex-shrink: 0; border-radius: 12px; background: var(--card);
  border: 1px solid var(--border);
  box-shadow: 0 1px 4px rgba(0,0,0,.06); overflow: hidden;
  transition: transform .22s var(--ease), box-shadow .22s var(--ease), border-color .15s;
  cursor: default; position: relative;
}
.ph:not(.ph-done-col):hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,0,0,.09);
}
.ph.st-warn { border-color: var(--accent); box-shadow: 0 2px 12px rgba(47,93,67,.12); }
.ph.st-warn:hover { box-shadow: 0 6px 20px rgba(47,93,67,.18); }
.ph.st-soon { border-color: var(--amber); }
.ph.st-overdue { border-color: var(--red); opacity: .85; }
.ph.st-done-col { opacity: .5; width: 160px !important; cursor: pointer; }
.ph.st-done-col:hover { opacity: .75; transform: translateY(-2px); }

/* 完了折り畳みカード */
.ph-done-inner {
  padding: 12px; display: flex; flex-direction: column; gap: 6px;
  height: 100%; justify-content: center;
}
.ph-done-name { font-size: 12px; font-weight: 700; }

/* カードヘッダー（列グリッドと統合） */
.ph-header { display: grid; border-bottom: 1px solid var(--border); background: var(--card); }
.col-prep { --col-c: var(--prep-c); --col-cl: var(--prep-bg); }
.col-day  { --col-c: var(--day-c);  --col-cl: var(--day-bg); }
.col-post { --col-c: var(--post-c); --col-cl: var(--post-bg); }

.ph-col-h {
  border-right: 1px solid var(--border); padding: 10px 0 9px;
  display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
  min-height: 64px; background: var(--card);
}
.ph-col-h:last-child { border-right: none; }
.ph-col-h.main {
  padding: 10px 12px 8px; align-items: center; justify-content: space-between;
}
.ph.st-warn .ph-col-h.main { background: transparent; }

.ph-name-block { display: flex; flex-direction: column; align-items: center; gap: 3px; width: 100%; }
.ph-hdr-row { display: flex; align-items: center; gap: 6px; }

.ph-name { font-size: 13px; font-weight: 700; text-align: center; }

/* 日付ブロック（目立つ表示） */
.ph-date-block {
  display: flex; align-items: baseline; gap: 2px;
  margin-top: 4px; justify-content: center;
}
.ph-date-md  { font-size: 16px; font-weight: 700; color: var(--t1); line-height: 1; }
.ph-date-dow { font-size: 11px; color: var(--t2); }
.ph-date-tm  { font-size: 11px; color: var(--t3); margin-left: 3px; }
.ph.st-warn    .ph-date-md { color: var(--accent); }
.ph.st-today   .ph-date-md { color: var(--red); }
.ph.st-overdue .ph-date-md { color: var(--red); }

.ph-pill {
  display: inline-flex; align-items: center; gap: 2px;
  font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 6px; margin-top: 3px;
}
.pill-done    { background: var(--bg);      color: var(--t3); }
.pill-warn    { background: var(--green-l); color: var(--accent); }
.pill-overdue { background: var(--red);     color: white; }
.pill-soon    { background: var(--amber-l); color: var(--amber); }
.pill-ok      { background: var(--green-l); color: var(--accent); }
.pill-none    { background: var(--bg);      color: var(--t3); font-weight: 400; }

.col-lbl {
  font-size: 9px; font-weight: 800; letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--t3);
}
/* 当日列のラベルだけアクセントグリーン */
.col-day .col-lbl { color: var(--accent); }
.ph-col-h.main .col-lbl { margin-top: 8px; }

/* 操作ボタン（カード右上） */
.ph-menu-btn {
  position: absolute; top: 8px; right: 8px;
  background: none; border: none; padding: 4px;
  display: flex; align-items: center;
  color: var(--t3); opacity: .5; border-radius: 6px;
  transition: opacity .15s, background .15s;
}
.ph-menu-btn:hover { opacity: 1; background: var(--border); }

/* タスクグリッド */
.ph-grid { display: grid; border-bottom: 1px solid var(--border); }
.ph-grid-col { border-right: 1px solid var(--border); }
.ph-grid-col:last-child { border-right: none; }
/* day列だけ極薄グリーン背景 */
.ph-grid-col.col-day { background: var(--day-bg); }

.ph-task {
  display: flex; align-items: flex-start; gap: 4px;
  padding: 5px 6px 5px 5px;
  border-bottom: 1px solid var(--border); cursor: pointer;
  transition: background .1s;
}
.ph-task:last-child { border-bottom: none; }
.ph-task:hover { background: var(--bg); }
.ph-task.is-done .ph-tname { text-decoration: line-through; color: var(--t3); }

.chk {
  width: 18px; height: 18px; border-radius: 5px; flex-shrink: 0;
  border: 1.5px solid var(--border-s);
  display: flex; align-items: center; justify-content: center;
  transition: all .1s;
}
.chk.on  { background: var(--accent); border-color: var(--accent); }
.chk.urg { border-color: var(--red); }
.ph-tname { font-size: 11px; line-height: 1.4; flex: 1; color: var(--t1); }
.ph-prio  { width: 5px; height: 5px; border-radius: 50%; background: var(--red); margin-top: 4px; flex-shrink: 0; }

/* タスク長押しメニュー（移動ボタン） */
.task-move-btn {
  flex-shrink: 0; background: none; border: none; padding: 2px 0;
  display: none; align-items: center; opacity: .4;
}
.ph-task:hover .task-move-btn { display: flex; }
.task-move-btn:hover { opacity: 1; }

/* フッター */
.ph-foot {
  display: flex; align-items: center; gap: 8px; padding: 7px 12px;
  background: var(--bg); font-size: 10px; color: var(--t3); font-family: var(--fm);
}
.foot-bar  { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.foot-fill { height: 100%; background: var(--green-m); border-radius: 2px; }
.foot-fill.red { background: var(--red); }
.ph-add-btn {
  display: flex; align-items: center; gap: 4px;
  padding: 5px 10px; border-radius: 7px;
  background: var(--card); border: 1px solid var(--border);
  color: var(--t3); font-size: 10px; font-weight: 600;
  transition: all .15s; flex-shrink: 0;
}
.ph-add-btn:hover { border-color: var(--green-m); color: var(--green-m); }

/* 工程追加ボタン */
.add-ph {
  flex-shrink: 0; width: 110px; margin: 0 8px; padding: 14px 10px;
  border: 2px dashed #c5dfd0; border-radius: 14px;
  background: var(--green-l); color: var(--green-m);
  font-size: 11px; font-weight: 600;
  display: flex; flex-direction: column; align-items: center; gap: 7px;
  transition: all .2s;
}
.add-ph:hover { background: var(--green-l); transform: translateY(-2px); }

/* 物件追加 */
.add-prop-block { padding: 12px 16px 24px; }
.add-prop-btn {
  width: 100%; padding: 14px; border: 2px dashed var(--border); border-radius: 12px;
  background: none; color: var(--t3); font-size: 13px; font-weight: 600;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: all .2s;
}
.add-prop-btn:hover { background: var(--card); color: var(--t2); }

/* ── モーダル ── */
#modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.45); align-items: center; justify-content: center;
  padding: 20px;
}
#modal-overlay.on { display: flex; }
#modal-box {
  background: var(--card); border-radius: 20px;
  padding: 24px 20px 32px; width: 100%; max-width: 480px;
  max-height: 90svh; overflow-y: auto;
}
.modal-title {
  font-size: 16px; font-weight: 700; margin-bottom: 20px;
  display: flex; align-items: center; justify-content: space-between;
}
.modal-close {
  background: none; border: none; font-size: 20px; color: var(--t3); line-height: 1;
}
.field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
.field label { font-size: 12px; font-weight: 600; color: var(--t2); }
.field input, .field select, .field textarea {
  padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 10px;
  font-size: 14px; font-family: var(--fp); background: var(--bg); color: var(--t1);
  outline: none; transition: border-color .15s; width: 100%;
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--green-m); }
.field-row { display: flex; gap: 10px; }
.field-row .field { flex: 1; }

/* Googleカレンダー風 日付・時刻フィールド */
.gc-row { display: flex; gap: 8px; margin-bottom: 14px; }
.gc-wrap { position: relative; flex: 1; }
.gc-wrap.time-wrap { flex: 0 0 auto; min-width: 110px; }
.gc-field {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 14px; border-radius: 10px; background: var(--bg);
  cursor: pointer; transition: background .12s; user-select: none;
}
.gc-field:hover { background: #ECEEED; }
.gc-field svg { flex-shrink: 0; color: var(--t3); }
.gc-val { font-size: 14px; color: var(--t1); font-weight: 500; }
.gc-val.ph { color: var(--t3); font-weight: 400; }
.gc-input {
  position: absolute; inset: 0; width: 100%; height: 100%;
  opacity: 0; cursor: pointer; border: none;
}
.gc-sep {
  display: flex; align-items: center; padding-top: 2px;
  color: var(--t3); font-size: 11px; padding-bottom: 14px; align-self: flex-end;
}
.modal-actions { display: flex; gap: 10px; margin-top: 20px; }
.btn-cancel {
  flex: 1; padding: 12px; border-radius: 10px; border: 1.5px solid var(--border);
  background: var(--bg); color: var(--t2); font-size: 14px; font-weight: 600;
}
.btn-save {
  flex: 2; padding: 12px; border-radius: 10px; border: none;
  background: var(--green-m); color: white; font-size: 14px; font-weight: 700;
}
.btn-danger {
  padding: 12px; border-radius: 10px; border: none;
  background: var(--red-l); color: var(--red); font-size: 13px; font-weight: 600;
}
.col-picker { display: flex; gap: 8px; margin-bottom: 4px; }
.col-pick-btn {
  flex: 1; padding: 10px 6px; border-radius: 10px;
  border: 1.5px solid var(--border); background: var(--bg);
  font-size: 13px; font-weight: 600; color: var(--t2);
  transition: all .15s;
}
.col-pick-btn.active {
  border-color: var(--green-m); background: var(--green-l); color: var(--green-m);
}
.section-sep {
  border: none; border-top: 1px solid var(--border); margin: 20px 0;
}
.hint { font-size: 11px; color: var(--t3); margin-top: 4px; }

/* ── テンプレートパネル ── */
#tmpl-overlay {
  display: none; position: fixed; inset: 0; z-index: 150;
  background: rgba(0,0,0,.4);
}
#tmpl-overlay.on { display: block; }
#tmpl-panel {
  position: fixed; top: 0; right: 0; bottom: 0; z-index: 151;
  width: min(480px, 100vw); background: var(--bg);
  display: flex; flex-direction: column;
  transform: translateX(100%); transition: transform .28s var(--ease);
  box-shadow: -4px 0 32px rgba(0,0,0,.12);
}
#tmpl-panel.on { transform: translateX(0); }
.tmpl-hdr {
  background: var(--card); border-bottom: 1px solid var(--border);
  padding: 14px 16px; display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.tmpl-hdr-title { font-size: 15px; font-weight: 700; flex: 1; }
.tmpl-hdr-sub   { font-size: 11px; color: var(--t2); }
.tmpl-autosave {
  font-size: 10px; color: var(--t3); transition: color .3s;
  white-space: nowrap;
}
.tmpl-autosave.saved { color: var(--accent); }
.tmpl-seed-btn {
  background: var(--green-l); border: 1px solid var(--green-m); border-radius: 8px;
  padding: 5px 10px; font-size: 11px; font-weight: 600; color: var(--green-m);
  white-space: nowrap; transition: all .15s;
}
.tmpl-seed-btn:hover { background: var(--green-m); color: #fff; }
.tmpl-seed-btn:disabled { opacity: .5; pointer-events: none; }
.tmpl-close {
  background: none; border: none; font-size: 20px; color: var(--t3);
  line-height: 1; padding: 4px;
}
.tmpl-body { flex: 1; overflow-y: auto; padding: 12px 12px 80px; display: flex; flex-direction: column; gap: 10px; }

/* ── テンプレートカード（工程カード風） ── */
.tmpl-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px;
}
.tmpl-card-grid { overflow: hidden; }
.tmpl-card-hdr {
  border-bottom: 1px solid var(--border);
}
/* 工程名バー（ハンドル + 名前） */
.tmpl-phase-bar {
  display: flex; align-items: center; gap: 6px; padding: 8px 10px 6px;
}
.phase-handle {
  color: var(--t3); font-size: 15px; cursor: grab; touch-action: none;
  user-select: none; padding: 2px 4px; border-radius: 5px; flex-shrink: 0;
  line-height: 1;
}
.phase-handle:hover { color: var(--t2); background: var(--border); }
.tmpl-card-phase-name {
  font-size: 12px; font-weight: 700; color: var(--t1); flex: 1;
}
.tmpl-phase-del {
  background: none; border: none; padding: 3px 5px; border-radius: 5px;
  color: var(--t3); line-height: 1; flex-shrink: 0;
  transition: color .1s, background .1s; display: flex; align-items: center;
}
.tmpl-phase-del:hover { color: var(--red); background: var(--red-l); }
/* 列ラベル行 */
.tmpl-col-labels-row {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  border-top: 1px solid var(--border);
}
.tmpl-col-lbl-cell {
  padding: 7px 8px; text-align: center;
  background: var(--card);
}
.tmpl-col-lbl-cell.col-prep { background: #F9FAF9; border-top: 2px solid #CBD3CA; }
.tmpl-col-lbl-cell.col-day  { background: var(--day-bg); border-top: 2px solid var(--accent); }
.tmpl-col-lbl-cell.col-post { background: #F9FAF9; border-top: 2px solid #CBD3CA; }
.tmpl-col-lbl-cell .col-lbl { font-size: 9px; }
.tmpl-col-lbl-cell:nth-child(2) {
  border-left: 1px solid var(--border); border-right: 1px solid var(--border);
}
/* 工程ドラッグ状態 */
.tmpl-card.pc-dragging { opacity: 0.35; }
.tmpl-card.pc-over {
  outline: 2px dashed var(--accent); outline-offset: -2px; border-radius: 14px;
}
.pc-ghost {
  position: fixed; z-index: 9999; pointer-events: none;
  opacity: 0.85; border-radius: 14px;
  box-shadow: 0 8px 24px rgba(0,0,0,.22);
}
/* タスク挿入インジケーター */
.tc-insert-before { box-shadow: 0 -2px 0 0 var(--accent); border-radius: 0; }
.tc-insert-after  { box-shadow: 0 2px 0 0 var(--accent); border-radius: 0; }
/* 工程追加ボタン */
.tmpl-add-phase-btn {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  width: 100%; border: 2px dashed var(--border); border-radius: 14px;
  padding: 14px; font-size: 13px; color: var(--t3);
  background: none; transition: all .15s; cursor: pointer; flex-shrink: 0;
}
.tmpl-add-phase-btn:hover { border-color: var(--accent); color: var(--accent); }
.tmpl-card-grid {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
}
.tmpl-card-col {
  padding: 6px 8px 8px; display: flex; flex-direction: column; gap: 2px;
}
.tmpl-card-col.col-prep { background: var(--prep-bg); }
.tmpl-card-col.col-day  { background: var(--day-bg); }
.tmpl-card-col.col-post { background: var(--post-bg); }
.tmpl-card-col:nth-child(2) {
  border-left: 1px solid var(--border); border-right: 1px solid var(--border);
}
.tmpl-card-task {
  display: flex; align-items: center; gap: 4px;
  padding: 5px 6px; border-radius: 7px;
  background: var(--bg); margin-bottom: 2px;
}
.tmpl-card-task-name {
  font-size: 11px; flex: 1; color: var(--t1); line-height: 1.35;
  word-break: break-all;
}
.tmpl-card-task-del {
  background: none; border: none; padding: 2px 3px;
  color: var(--t3); line-height: 1; border-radius: 4px;
  flex-shrink: 0; transition: color .1s, background .1s;
  display: flex; align-items: center;
}
.tmpl-card-task-del:hover { color: var(--red); background: var(--red-l); }
.tmpl-card-task { cursor: grab; touch-action: none; }
.tmpl-card-task.tc-dragging { opacity: 0.35; }
.tmpl-card-col.tc-over {
  background: var(--green-l); border-radius: 7px;
  outline: 2px dashed var(--green-m); outline-offset: -2px;
}
.tc-ghost {
  position: fixed; z-index: 9999; pointer-events: none;
  opacity: 0.85; border-radius: 7px;
  box-shadow: 0 6px 20px rgba(0,0,0,.25);
}
.tmpl-card-add-btn {
  display: flex; align-items: center; justify-content: center; gap: 3px;
  width: 100%; border: 1px dashed var(--border); border-radius: 7px;
  padding: 5px 4px; font-size: 10px; color: var(--t3);
  background: none; margin-top: 2px; transition: all .15s;
}
.tmpl-card-add-btn:hover { border-color: var(--accent); color: var(--accent); }
/* インライン追加フォーム */
.tmpl-inline-add {
  background: var(--card); border: 1.5px solid var(--accent); border-radius: 7px;
  padding: 5px 6px; margin-bottom: 2px;
}
.tmpl-inline-input {
  width: 100%; border: none; background: transparent; font-size: 11px;
  color: var(--t1); outline: none; padding: 1px 0 4px;
}
.tmpl-inline-btns { display: flex; gap: 4px; justify-content: flex-end; }
.tmpl-inline-cancel {
  font-size: 10px; padding: 2px 7px; border-radius: 4px; border: none;
  background: var(--border); color: var(--t2); cursor: pointer;
}
.tmpl-inline-save {
  font-size: 10px; padding: 2px 8px; border-radius: 4px; border: none;
  background: var(--accent); color: white; cursor: pointer; font-weight: 600;
}

/* ── 日程一括入力 ── */
.bdate-row {
  padding: 10px 12px; background: var(--bg); border-radius: 10px;
  border: 1px solid var(--border);
}
.bdate-phase-name {
  font-size: 12px; font-weight: 700; color: var(--t2);
  margin-bottom: 8px; letter-spacing: .02em;
}
.field-input {
  border: 1px solid var(--border); border-radius: 7px; color: var(--t1);
  background: var(--bg); outline: none;
}
.field-input:focus { border-color: var(--green-m); }

/* ── トースト ── */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--t1); color: white; padding: 10px 14px 10px 18px;
  border-radius: 10px; font-size: 13px; font-weight: 500;
  opacity: 0; transition: opacity .25s; z-index: 300;
  pointer-events: none; white-space: nowrap;
  display: flex; align-items: center; gap: 12px;
}
#toast.show { opacity: 1; pointer-events: auto; }
#toast-undo {
  background: none; border: 1.5px solid rgba(255,255,255,.5);
  color: white; font-size: 12px; font-weight: 700;
  padding: 3px 10px; border-radius: 6px; cursor: pointer;
  transition: background .12s; white-space: nowrap; flex-shrink: 0;
}
#toast-undo:hover { background: rgba(255,255,255,.15); }
.toast-bar {
  height: 2px; background: rgba(255,255,255,.3); border-radius: 1px;
  position: absolute; bottom: 0; left: 0; right: 0; border-radius: 0 0 10px 10px; overflow: hidden;
}
.toast-bar-fill {
  height: 100%; background: rgba(255,255,255,.6);
  animation: toast-countdown 5s linear forwards;
}
@keyframes toast-countdown { from { width:100%; } to { width:0%; } }

/* ── ローディング ── */
.loading-wrap {
  display: flex; align-items: center; justify-content: center;
  height: 200px; gap: 10px; color: var(--t3); font-size: 13px;
}

/* ── スマホ（〜640px） ── */
@media(max-width:640px) {
  .mob-tabs {
    display: flex; position: sticky; top: 52px; z-index: 90;
    background: var(--card); border-bottom: 2px solid var(--border);
    overflow-x: auto; scrollbar-width: none; padding: 0 4px;
  }
  .mob-tabs::-webkit-scrollbar { display: none; }
  .mob-tab {
    flex-shrink: 0; display: flex; align-items: center; gap: 5px;
    padding: 10px 13px 9px; background: none; border: none;
    font-size: 12px; font-weight: 600; color: var(--t3);
    border-bottom: 2px solid transparent; margin-bottom: -2px;
    transition: color .15s, border-color .15s; white-space: nowrap;
  }
  .mob-tab.active { color: var(--green-m); border-bottom-color: var(--green-m); }
  .mob-tab-badge {
    font-size: 9px; font-weight: 700; padding: 1px 5px;
    border-radius: 5px; background: var(--red-l); color: var(--red);
  }
  .mob-tab.active .mob-tab-badge { background: var(--red); color: white; }

  .prop-block          { display: none; }
  .prop-block.mob-show { display: block; }
  .add-prop-block      { display: block; }

  .phase-scroll {
    flex-direction: column; overflow-x: hidden;
    padding: 8px 12px 16px; gap: 10px; align-items: stretch;
  }
  .ph { width: 100% !important; }
  .ph.st-done-col { width: 100% !important; }

  .conn { padding: 0; justify-content: center; width: 100%; }
  .conn-line { width: 2px; height: 18px; margin: 0 auto; }
  .conn-line::after {
    right: -4px; top: auto; bottom: -6px;
    border-color: transparent; border-top-color: var(--border);
  }
  .conn-line.warn::after { border-color: transparent; border-top-color: var(--red); }

  .add-ph { width: 100%; flex-direction: row; padding: 10px 16px; gap: 8px; }
  .ph-tname { font-size: 12px; }
  .ph-task  { padding: 9px 10px 9px 8px; }
}

/* ═══ ボトムナビゲーション ═══ */
#bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 160;
  display: flex; background: var(--card);
  border-top: 1px solid var(--border);
  padding: 6px 0 max(env(safe-area-inset-bottom), 10px);
}
.bnav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  background: none; border: none; padding: 5px 4px 2px; cursor: pointer;
  color: var(--t3); font-family: var(--fp); transition: color .15s;
}
.bnav-item.active { color: var(--accent); }
.bnav-item span { font-size: 10px; font-weight: 600; letter-spacing: .02em; }

/* ═══ スクリーン共通 ═══ */
#app-screen {
  min-height: 100svh;
  padding-bottom: 80px;
  background: var(--bg);
  font-family: var(--fp);
}

/* ═══ ホーム画面 ═══ */
.home-hdr {
  padding: 56px 20px 20px;
}
.home-date {
  font-size: 11px; color: var(--t3); letter-spacing: .08em; text-transform: uppercase;
  font-weight: 600; margin-bottom: 6px;
}
.home-greeting {
  font-size: 28px; font-weight: 700; letter-spacing: -.02em; line-height: 1.2;
  color: var(--t1);
}
/* ホームのヒーローカード（警告工程） */
.home-hero {
  margin: 0 16px 14px; padding: 18px;
  border-radius: 14px; cursor: pointer;
  background: var(--green-l);
  border: 1px solid var(--accent);
}
.home-hero.overdue {
  background: var(--red-l);
  border-color: var(--red);
}
.home-hero-label {
  font-size: 10px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase;
  margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
  color: var(--accent);
}
.home-hero.overdue .home-hero-label { color: var(--red); }
.home-hero-name {
  font-size: 22px; font-weight: 700; letter-spacing: -.01em; color: var(--t1);
}
.home-hero-sub { font-size: 13px; color: var(--t2); margin-top: 4px; }
.home-hero-foot {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 14px; padding-top: 12px;
  border-top: 1px solid rgba(47,93,67,.15);
  font-size: 12px; color: var(--t2);
}
.home-hero.overdue .home-hero-foot { border-top-color: rgba(181,76,61,.15); }

/* ステータスメトリクス行 */
.home-metrics {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 8px; padding: 0 16px 20px;
}
.home-metric {
  background: var(--card); padding: 12px; border-radius: 10px;
  border: 1px solid var(--border);
}
.home-metric-label {
  font-size: 9px; font-weight: 700; color: var(--t3);
  letter-spacing: .1em; text-transform: uppercase;
}
.home-metric-val {
  font-size: 26px; font-weight: 700; letter-spacing: -.02em;
  margin-top: 4px; color: var(--t1);
}
.home-metric-val.danger { color: var(--red); }
.home-metric-sub { font-size: 10px; color: var(--t3); margin-top: 2px; }

/* セクションヘッダ */
.sec-hdr {
  display: flex; align-items: baseline; justify-content: space-between;
  padding: 0 20px 10px; margin-top: 4px;
}
.sec-hdr-label {
  font-size: 10px; font-weight: 800; letter-spacing: .1em;
  text-transform: uppercase; color: var(--t3);
}
.sec-hdr-count { font-size: 11px; color: var(--t3); }

/* 今日のタスクリスト */
.today-tasks {
  margin: 0 16px; border-radius: 10px; overflow: hidden;
  border: 1px solid var(--border);
}
.today-task {
  background: var(--card); padding: 12px 14px;
  display: flex; align-items: center; gap: 12px; cursor: pointer;
  border-bottom: 1px solid var(--border);
}
.today-task:last-child { border-bottom: none; }
.today-task-info { flex: 1; min-width: 0; }
.today-task-name { font-size: 14px; font-weight: 500; }
.today-task-meta {
  font-size: 11px; color: var(--t3); margin-top: 3px;
  display: flex; align-items: center; gap: 6px;
}
.today-task-urgent { color: var(--red); font-weight: 700; }

/* 直近の工程 */
.upcoming-card {
  background: var(--card); border-radius: 10px; border: 1px solid var(--border);
  padding: 14px 16px; margin: 0 16px 8px; cursor: pointer;
  position: relative; overflow: hidden;
}
.upcoming-card.warn-card { border-color: var(--accent); }
.upcoming-card-accent {
  position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--accent);
}
.upcoming-card-name { font-size: 15px; font-weight: 600; }
.upcoming-card-meta { font-size: 12px; color: var(--t2); margin-top: 4px; }
.upcoming-card-bar { height: 2px; background: var(--border); margin-top: 10px; border-radius: 1px; overflow: hidden; }
.upcoming-card-fill { height: 100%; background: var(--accent); }

/* ═══ 物件一覧画面 ═══ */
.props-hdr {
  padding: 56px 20px 14px;
  display: flex; align-items: baseline; justify-content: space-between;
}
.props-hdr-title { font-size: 28px; font-weight: 700; letter-spacing: -.02em; }
.props-hdr-count { font-size: 12px; color: var(--t3); }

.search-box {
  margin: 0 16px 14px;
  display: flex; align-items: center; gap: 8px; padding: 10px 14px;
  background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  color: var(--t3);
}
.search-input {
  flex: 1; border: none; background: transparent; outline: none;
  font-size: 14px; color: var(--t1); font-family: var(--fp);
}
.search-input::placeholder { color: var(--t3); }

.prop-card {
  background: var(--card); border-radius: 12px; border: 1px solid var(--border);
  padding: 16px 18px; margin: 0 16px 10px; cursor: pointer;
}
.prop-card-top {
  display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px;
}
.prop-card-name { font-size: 16px; font-weight: 600; }
.prop-card-city { font-size: 12px; color: var(--t3); margin-top: 3px; }
.prop-warn-badge {
  display: flex; align-items: center; gap: 4px;
  padding: 3px 9px; border-radius: 12px;
  background: var(--green-l); color: var(--accent);
  font-size: 11px; font-weight: 700; flex-shrink: 0;
}
.prop-dates-strip { display: flex; gap: 14px; margin-bottom: 10px; }
.prop-dates-strip dt { font-size: 10px; color: var(--t3); font-weight: 700; margin-bottom: 2px; }
.prop-dates-strip dd { font-size: 11px; color: var(--t2); }
.prop-progress-row {
  display: flex; align-items: center; gap: 10px;
}
.prop-progress-bar { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.prop-progress-fill { height: 100%; background: var(--accent); }
.prop-progress-pct { font-size: 11px; color: var(--t2); white-space: nowrap; }
.prop-next-phase {
  margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px; font-size: 12px;
}
.prop-add-btn {
  margin: 0 16px 10px; width: calc(100% - 32px);
  padding: 14px; background: transparent; border: 1.5px dashed var(--border-s);
  border-radius: 12px; font-family: var(--fp); font-size: 13px; font-weight: 600;
  color: var(--t3); cursor: pointer; display: flex; align-items: center;
  justify-content: center; gap: 6px; transition: all .15s;
}
.prop-add-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ═══ 物件詳細画面 ═══ */
.detail-hdr {
  padding: 56px 16px 10px;
  display: flex; align-items: center; gap: 10px; position: sticky; top: 0;
  background: var(--bg); z-index: 10; border-bottom: 1px solid var(--border);
}
.detail-back {
  width: 36px; height: 36px; border-radius: 18px; border: 1px solid var(--border);
  background: var(--card); color: var(--t1); display: flex; align-items: center;
  justify-content: center; cursor: pointer; flex-shrink: 0;
}
.detail-hdr-title { font-size: 18px; font-weight: 700; flex: 1; letter-spacing: -.01em; }

/* 物件タブ（横スクロール・スティッキー） */
.prop-tabs {
  display: flex; gap: 4px; padding: 10px 16px;
  overflow-x: auto; scrollbar-width: none;
  position: sticky; top: 103px; z-index: 9;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.prop-tabs::-webkit-scrollbar { display: none; }
.prop-tab {
  flex-shrink: 0; padding: 8px 14px; border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--card); color: var(--t2);
  font-size: 13px; font-weight: 500; font-family: var(--fp);
  display: flex; align-items: center; gap: 6px; cursor: pointer;
  white-space: nowrap; transition: all .15s;
}
.prop-tab.active {
  background: var(--accent); border-color: var(--accent); color: white; font-weight: 700;
}
.prop-tab-badge {
  font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px;
  background: var(--green-l); color: var(--accent);
}
.prop-tab.active .prop-tab-badge {
  background: rgba(255,255,255,.25); color: white;
}

/* 物件サマリカード */
.detail-summary {
  margin: 0 16px 14px; padding: 14px 16px;
  background: var(--card); border: 1px solid var(--border); border-radius: 12px;
}
.detail-dates-grid {
  display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; margin-bottom: 12px;
}
.detail-date-item dt { font-size: 9px; color: var(--t3); font-weight: 700; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 3px; }
.detail-date-item dd { font-size: 14px; font-weight: 700; color: var(--t1); }
.detail-progress-row { display: flex; align-items: center; gap: 10px; }
.detail-progress-bar { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.detail-progress-fill { height: 100%; background: var(--accent); }
.detail-progress-pct { font-size: 11px; color: var(--t2); }

/* 工程カード（縦レイアウト、全幅） */
.v-phase-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; overflow: hidden; margin: 0 16px 10px;
  transition: transform .22s cubic-bezier(.25,.46,.45,.94),
              box-shadow .22s cubic-bezier(.25,.46,.45,.94);
  cursor: default;
}
.v-phase-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,0,0,.09);
}
.v-phase-card:active {
  transform: translateY(-5px);
  box-shadow: 0 12px 32px rgba(0,0,0,.15);
}
.v-phase-card.urgent { border-color: var(--accent); }
.v-phase-card.urgent:hover { box-shadow: 0 6px 20px rgba(47,93,67,.14); }
.v-phase-card.urgent:active { box-shadow: 0 12px 32px rgba(47,93,67,.22); }
.v-phase-card.overdue { border-color: var(--red); }
.v-phase-card.overdue:hover { box-shadow: 0 6px 20px rgba(181,76,61,.14); }
.v-phase-card.overdue:active { box-shadow: 0 12px 32px rgba(181,76,61,.24); }
.v-phase-hdr {
  padding: 12px 14px 10px;
  border-bottom: 1px solid var(--border);
}
.v-phase-hdr.urgent-bg { background: var(--green-l); }
.v-phase-hdr.overdue-bg {
  background: var(--red-l);
}
.v-phase-meta {
  display: flex; align-items: center; gap: 8px; margin-bottom: 4px;
}
.v-phase-date { font-size: 11px; font-weight: 700; color: var(--t3); }
.v-phase-date.urgent { color: var(--accent); }
.v-phase-date.overdue { color: var(--red); }
.v-phase-row {
  display: flex; align-items: baseline; justify-content: space-between;
}
.v-phase-name { font-size: 17px; font-weight: 700; letter-spacing: -.01em; }
.v-phase-count { font-size: 11px; color: var(--t3); }
/* 3列グリッド（工程詳細） */
.v-phase-cols { display: grid; grid-template-columns: 1fr 1fr 1fr; }
.v-phase-col {
  border-left: 1px solid var(--border); min-height: 60px;
}
.v-phase-col:first-child { border-left: none; }
.v-phase-col.col-day { background: var(--day-bg); }
.v-phase-col-hdr {
  padding: 6px 8px 5px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.v-phase-col-label {
  font-size: 9px; font-weight: 800; letter-spacing: .08em;
  text-transform: uppercase; color: var(--t3);
}
.v-phase-col.col-day .v-phase-col-label { color: var(--accent); }
.v-phase-col-count { font-size: 9px; color: var(--t3); }
.v-phase-col-tasks { padding: 4px 4px 6px; }
.v-task {
  display: flex; align-items: flex-start; gap: 6px;
  padding: 6px 6px; border-radius: 5px; cursor: pointer;
}
.v-task-chk {
  width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0; margin-top: 1px;
  border: 1.5px solid var(--border-s); background: transparent;
  display: flex; align-items: center; justify-content: center;
  transition: all .1s;
}
.v-task-chk.done { background: var(--accent); border-color: var(--accent); }
.v-task-chk.prio { border-color: var(--red); }
.v-task-name {
  font-size: 11px; line-height: 1.35; flex: 1; min-width: 0;
  color: var(--t1); word-break: break-all;
}
.v-task-name.done { color: var(--t3); text-decoration: line-through; }
.v-prio-badge {
  font-size: 8px; font-weight: 800; padding: 1px 4px; border-radius: 3px;
  background: var(--red-l); color: var(--red); margin-left: 4px;
}
.v-add-task-btn {
  width: 100%; padding: 4px; font-size: 10px; color: var(--t3);
  background: transparent; border: 1px dashed var(--border); border-radius: 4px;
  cursor: pointer; margin-top: 2px; font-family: var(--fp);
}
/* 完了工程 — コンパクト折り畳み */
.v-phase-card.done-mini {
  opacity: 0.48;
  cursor: pointer;
  transition: opacity .18s, transform .22s cubic-bezier(.25,.46,.45,.94), box-shadow .22s cubic-bezier(.25,.46,.45,.94);
}
.v-phase-card.done-mini:hover { opacity: 0.75; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.07); }
/* 展開中の完了カード（少しグレーアウト） */
.v-phase-card.done-expanded { opacity: 0.7; }
.v-mini-inner {
  display: flex; align-items: center; gap: 10px; padding: 11px 14px;
}
.v-mini-check {
  width: 20px; height: 20px; border-radius: 10px; flex-shrink: 0;
  background: var(--accent); color: white;
  display: flex; align-items: center; justify-content: center;
}
.v-mini-name { font-size: 13px; font-weight: 600; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.v-mini-date { font-size: 11px; color: var(--t3); white-space: nowrap; }
.v-mini-count { font-size: 10px; color: var(--t3); font-family: var(--fm); white-space: nowrap; }

.v-phase-foot {
  padding: 8px 14px; border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.v-phase-add-btn {
  font-size: 11px; color: var(--accent); background: none; border: none;
  cursor: pointer; font-family: var(--fp); font-weight: 600; padding: 0;
  display: flex; align-items: center; gap: 4px;
}
.v-phase-menu-btn {
  background: none; border: none; padding: 4px; color: var(--t3);
  cursor: pointer; display: flex; align-items: center;
}

/* ステータスピル（共通） */
.status-pill {
  font-size: 10px; font-weight: 700; letter-spacing: .04em;
  padding: 3px 9px; border-radius: 20px; white-space: nowrap; flex-shrink: 0;
}
.sp-warn    { background: var(--green-l); color: var(--accent); }
.sp-today   { background: var(--green-l); color: var(--accent); }
.sp-overdue { background: var(--red); color: white; }
.sp-soon    { background: var(--amber-l); color: var(--amber); }
.sp-ok      { background: var(--bg); color: var(--t2); }
.sp-done    { background: var(--green-l); color: var(--accent); }
.sp-nodate  { background: var(--bg); color: var(--t3); }

/* その他画面 */
.more-screen {
  padding: 80px 20px; text-align: center; color: var(--t3);
  font-size: 14px;
}
.more-screen-title { font-size: 28px; font-weight: 700; color: var(--t1); margin-bottom: 8px; }
.more-action-list { margin: 32px 0; display: flex; flex-direction: column; gap: 1px; }
.more-action {
  background: var(--card); padding: 16px 18px; border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  font-size: 14px; color: var(--t1); cursor: pointer; text-align: left;
}
.more-action:first-child { border-radius: 12px 12px 0 0; }
.more-action:last-child { border-radius: 0 0 12px 12px; }
</style>
</head>
<body>

<!-- ── ログイン ── -->
<div id="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-4 0v2"/><path d="M8 7V5a2 2 0 0 0-4 0v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/>
      </svg>
    </div>
    <div class="login-title">現場タスク管理</div>
    <div class="login-sub" id="login-sub">アクセスキーを入力してください</div>

    <!-- 初回セットアップ欄（GAS URL未設定時のみ表示） -->
    <div id="setup-section" style="display:none">
      <div style="background:#F0F9F4;border:1px solid #C6DFD0;border-radius:10px;padding:12px 14px;margin-bottom:16px;font-size:12px;color:#2F5D43;line-height:1.6">
        <strong>初回セットアップ</strong><br>
        管理者から受け取ったGAS URLとアクセスキーを入力してください。
      </div>
      <div class="login-field">
        <label>GAS URL</label>
        <input type="url" id="gas-input" placeholder="https://script.google.com/macros/s/..."
          style="font-size:12px" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
    </div>

    <!-- 2回目以降：URL変更リンク -->
    <div id="url-saved-section" style="display:none;margin-bottom:12px">
      <div style="font-size:11px;color:var(--t3);display:flex;align-items:center;justify-content:space-between">
        <span>接続先が設定済みです</span>
        <button onclick="showSetupSection()" style="background:none;border:none;font-size:11px;color:var(--accent);cursor:pointer;padding:0;font-family:var(--fp)">変更する</button>
      </div>
    </div>

    <div class="login-field">
      <label>アクセスキー</label>
      <input type="password" id="key-input" placeholder="••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-login" id="btn-login" onclick="doLogin()">ログイン</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- ── メインアプリ ── -->
<div id="app" style="display:none">
  <!-- スクリーンコンテンツ -->
  <div id="app-screen">
    <div class="loading-wrap">読み込み中…</div>
  </div>

  <!-- ボトムナビゲーション -->
  <nav id="bottom-nav">
    <button class="bnav-item" id="bnav-home" onclick="navTo('home')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10l9-7 9 7v11a2 2 0 01-2 2h-4v-7h-6v7H5a2 2 0 01-2-2V10z"/></svg>
      <span>ホーム</span>
    </button>
    <button class="bnav-item" id="bnav-props" onclick="navTo('props')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
      <span>物件</span>
    </button>
    <button class="bnav-item" id="bnav-tmpl" onclick="openTmplPanel()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      <span>テンプレ</span>
    </button>
    <button class="bnav-item" id="bnav-more" onclick="navTo('more')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="5" cy="12" r="1.2" fill="currentColor"/><circle cx="12" cy="12" r="1.2" fill="currentColor"/><circle cx="19" cy="12" r="1.2" fill="currentColor"/></svg>
      <span>その他</span>
    </button>
  </nav>
</div>

<!-- ── テンプレートパネル ── -->
<div id="tmpl-overlay" onclick="closeTmplPanel()"></div>
<div id="tmpl-panel">
  <div class="tmpl-hdr">
    <div>
      <div class="tmpl-hdr-title">テンプレート設定</div>
      <div class="tmpl-hdr-sub">物件追加時に自動生成されるタスク</div>
    </div>
    <span class="tmpl-autosave" id="tmpl-autosave">自動保存</span>
    <button class="tmpl-seed-btn" onclick="runSeedTemplates()" title="旧アプリのタスクを一括登録">初期登録</button>
    <button class="tmpl-close" onclick="closeTmplPanel()">×</button>
  </div>
  <div class="tmpl-body" id="tmpl-body"><div class="loading-wrap">読み込み中…</div></div>
</div>

<!-- ── モーダル ── -->
<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div id="modal-box">
    <div class="modal-title">
      <span id="modal-title-txt"></span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- ── トースト ── -->
<div id="toast">
  <span id="toast-msg"></span>
  <button id="toast-undo" style="display:none" onclick="undoDelete()">元に戻す</button>
  <div class="toast-bar"><div class="toast-bar-fill" id="toast-bar-fill"></div></div>
</div>

<script>
'use strict';
// ═══════════════════════════════════════
// 状態
// ═══════════════════════════════════════
let GAS_URL = '';
let KEY     = '';
let propData  = [];   // [{name,city,start,frame,completion,handover}]
let phaseData = [];   // [{id,prop,name,date,time,order,alert_prep,alert_post}]
let taskData  = [];   // [{id,prop,phase_id,col,name,done,order,priority}]
let activePropIdx = 0;
let showDonePhases = {}; // {propName: bool}

// ── ナビゲーション状態 ──
let currentScreen = 'home';
let currentPropName = null;  // 物件詳細で使うproper名
const expandedPhases = new Set(); // 完了済みでも展開表示する工程ID

const COL_LABELS = { prep:'準備', day:'当日', post:'事後' };
const COLS = ['prep','day','post'];

// ═══════════════════════════════════════
// API
// ═══════════════════════════════════════
async function api(payload) {
  const r = await fetch(GAS_URL, {
    method:'POST', body: JSON.stringify({ key: KEY, ...payload })
  });
  const d = await r.json();
  if (!d.ok) throw new Error(d.error || 'APIエラー');
  return d;
}

// ═══════════════════════════════════════
// 初期化
// ═══════════════════════════════════════
function init() {
  const params = new URLSearchParams(location.search);
  const pGas = params.get('gas');
  const pKey = params.get('key');
  if (pGas) { GAS_URL = pGas; localStorage.setItem('gas_url_v2', pGas); }
  else       { GAS_URL = localStorage.getItem('gas_url_v2') || ''; }
  if (pKey) { KEY = pKey; }

  // ログイン画面の表示切り替え
  if (!GAS_URL) {
    // 初回：セットアップ欄を表示
    document.getElementById('setup-section').style.display = '';
    document.getElementById('login-sub').textContent = '初回設定を行ってください';
  } else {
    // 2回目以降：「設定済み」を表示
    document.getElementById('url-saved-section').style.display = '';
  }

  const savedKey    = localStorage.getItem('access_key_v2');
  const loginExpiry = Number(localStorage.getItem('login_expiry_v2') || 0);
  if (savedKey && GAS_URL && Date.now() < loginExpiry) {
    // セッション有効 → 自動ログイン
    KEY = savedKey;
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('app').style.display = '';
    loadAll();
  } else if (savedKey) {
    document.getElementById('key-input').value = savedKey;
  }
}

function showSetupSection() {
  document.getElementById('url-saved-section').style.display = 'none';
  document.getElementById('setup-section').style.display = '';
  document.getElementById('login-sub').textContent = 'GAS URLを変更します';
  document.getElementById('gas-input').value = GAS_URL;
  document.getElementById('gas-input').focus();
}

async function doLogin() {
  const gasEl  = document.getElementById('gas-input');
  const keyEl  = document.getElementById('key-input');
  const errEl  = document.getElementById('login-err');
  errEl.textContent = '';

  // セットアップ欄が表示中ならGAS URLを取得
  const setupVisible = document.getElementById('setup-section').style.display !== 'none';
  if (setupVisible) {
    const inputUrl = gasEl?.value.trim() || '';
    if (!inputUrl) { errEl.textContent = 'GAS URLを入力してください'; return; }
    GAS_URL = inputUrl;
    localStorage.setItem('gas_url_v2', GAS_URL);
  }
  if (!GAS_URL) { errEl.textContent = 'GAS URLが設定されていません'; return; }
  KEY = keyEl.value.trim();
  if (!KEY) { errEl.textContent = 'アクセスキーを入力してください'; return; }

  const btn = document.getElementById('btn-login');
  btn.disabled = true;
  btn.innerHTML = '<div class="spin"></div>確認中…';
  try {
    const d = await api({ mode:'login', key: KEY });
    localStorage.setItem('access_key_v2', KEY);
    localStorage.setItem('login_expiry_v2', String(Date.now() + 2 * 60 * 60 * 1000));
    if (d.firstLogin) openChangeKeyModal();
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('app').style.display = '';
    await loadAll();
  } catch(e) {
    errEl.textContent = e.message;
    btn.disabled = false;
    btn.textContent = 'ログイン';
  }
}

// ═══════════════════════════════════════
// データ読み込み
// ═══════════════════════════════════════
async function loadAll() {
  try {
    const d = await api({ mode:'getAll' });
    propData  = d.props  || [];
    phaseData = d.phases || [];
    taskData  = d.tasks  || [];
    renderAll();
    navTo('home');
  } catch(e) {
    document.getElementById('app-screen').innerHTML =
      `<div class="loading-wrap" style="color:var(--red)">読み込みエラー: ${esc(e.message)}</div>`;
  }
}

// ═══════════════════════════════════════
// レンダリング
// ═══════════════════════════════════════
function renderAll() {
  setNavActive(currentScreen);
  renderScreen();
  updateHdrSub();
}

function navTo(screen, propName) {
  currentScreen = screen;
  if (propName !== undefined) currentPropName = propName;
  setNavActive(screen);
  renderScreen();
}

function setNavActive(screen) {
  ['home','props','tmpl','more'].forEach(id => {
    const el = document.getElementById('bnav-' + id);
    if (el) el.classList.toggle('active', id === screen);
  });
}

function renderScreen() {
  switch (currentScreen) {
    case 'home':   renderHomeScreen(); break;
    case 'props':  renderPropListScreen(); break;
    case 'prop':   renderPropDetailScreen(currentPropName); break;
    case 'more':   renderMoreScreen(); break;
  }
}

function updateHdrSub() {
  const el = document.getElementById('hdr-sub');
  if (!el) return;
  const active = propData.filter(p => {
    const phases = phaseData.filter(ph => ph.prop === p.name);
    return phases.some(ph => ['warn','overdue','today'].includes(phaseStatus(ph)));
  }).length;
  el.textContent =
    `${propData.length}物件` + (active ? ` · ⚠ ${active}件要確認` : '');
}

function renderMobTabs() {
  const el = document.getElementById('mobTabs');
  el.innerHTML = propData.map((p, i) => {
    const warnCount = phaseData.filter(ph =>
      ph.prop === p.name && ['warn','overdue','today'].includes(phaseStatus(ph))
    ).length;
    const badge = warnCount ? `<span class="mob-tab-badge">⚠${warnCount}</span>` : '';
    return `<button class="mob-tab${i===activePropIdx?' active':''}" onclick="switchProp(${i})">
      ${esc(p.name)}${badge}
    </button>`;
  }).join('');
}

function renderContent() {
  document.getElementById('content').innerHTML =
    propData.map((p, i) => propBlockHTML(p, i)).join('');
}

function propBlockHTML(prop, idx) {
  const phases = phaseData.filter(ph => ph.prop === prop.name);
  const tasks  = taskData.filter(t  => t.prop  === prop.name);

  // 全体進捗
  const total = tasks.length;
  const done  = tasks.filter(t => isBool(t.done)).length;
  const pct   = total ? Math.round(done / total * 100) : 0;

  // 警告数
  const warnCnt = phases.filter(ph => ['warn','overdue','today'].includes(phaseStatus(ph))).length;

  // 日付チップ
  function chip(label, d) {
    const diff = dateDiff(d);
    const hi = diff !== null && diff >= 0 && diff <= 7 ? ' hi' : '';
    return `<div class="pdi"><span class="pdi-key">${label}</span><span class="pdi-val${hi}">${fmtDate(d)}</span></div>`;
  }

  // 引渡し完了チェック
  const handoverPhase = phases.find(ph => ph.name === '引渡し');
  const handoverTasks = handoverPhase ? taskData.filter(t => t.phase_id === handoverPhase.id) : [];
  const isCompleted = handoverPhase && handoverTasks.length > 0 && handoverTasks.every(t => isBool(t.done));

  const showDone = showDonePhases[prop.name] || false;
  const donePhases   = phases.filter(ph => phaseStatus(ph) === 'done');
  const activePhases = phases.filter(ph => phaseStatus(ph) !== 'done');
  const visiblePhases = showDone ? phases : activePhases;

  // 工程カードと矢印
  let phasesHTML = '';
  visiblePhases.forEach((ph, i) => {
    if (i > 0) {
      const prevSt = phaseStatus(visiblePhases[i-1]);
      const cls = (prevSt==='warn'||prevSt==='overdue'||prevSt==='today') ? ' warn' : '';
      phasesHTML += `<div class="conn"><div class="conn-line${cls}"></div></div>`;
    }
    phasesHTML += phaseCardHTML(ph);
  });

  // 完了工程トグル
  const doneToggleHTML = donePhases.length ?
    `<button class="done-toggle" onclick="toggleDonePhases('${esc(prop.name)}')">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        ${showDone ? '<polyline points="18,15 12,9 6,15"/>' : '<polyline points="6,9 12,15 18,9"/>'}
      </svg>
      完了工程 ${showDone ? '非表示' : `${donePhases.length}件表示`}
    </button>` : '';

  const mobShowClass = idx === activePropIdx ? ' mob-show' : '';

  return `
  <div class="prop-block${mobShowClass}" data-prop="${esc(prop.name)}">
    <div class="prop-label">
      <div class="prop-label-top">
        <div class="prop-label-main">
          <div class="prop-label-name">${esc(prop.name)}${prop.city ? `<span class="prop-city"> · ${esc(prop.city)}</span>` : ''}</div>
          <div class="prop-dates-inline">
            ${chip('着工',prop.start)}${chip('建て方',prop.frame)}${chip('竣工',prop.completion)}${chip('引渡し',prop.handover)}
          </div>
        </div>
        <div class="prop-label-right">
          ${warnCnt ? `<span class="warn-badge">⚠ ${warnCnt}件</span>` : ''}
          <div class="prog-wrap">
            <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
            <span class="prog-pct">${pct}%</span>
          </div>
          <button class="btn-sm btn-ghost" style="padding:5px 9px;font-size:11px"
            onclick="openBulkDateModal('${esc(prop.name)}')"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" style="vertical-align:-1px"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> 日程</button>
          <button class="btn-sm btn-ghost" style="padding:5px 9px;font-size:11px"
            onclick="openEditPropModal('${esc(prop.name)}')">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
    ${isCompleted ? `
    <div class="handover-banner">
      <div class="handover-banner-icon">🎉</div>
      <div class="handover-banner-text">
        <div class="handover-banner-title">お疲れ様でした！</div>
        <div class="handover-banner-sub">${esc(prop.name)}の全工程が完了しました</div>
      </div>
      <button class="btn-delete-prop" onclick="openDeletePropModal('${esc(prop.name)}')">物件を削除</button>
    </div>` : ''}
    ${doneToggleHTML}
    <div class="phase-scroll" id="ps-${esc(prop.name)}">
      ${phasesHTML}
      <div class="conn"><div class="conn-line"></div></div>

function phaseCardHTML(ph) {
  const st     = phaseStatus(ph);
  const tasks  = taskData.filter(t => t.phase_id === ph.id);
  const doneT  = tasks.filter(t => isBool(t.done)).length;
  const total  = tasks.length;
  const pct    = total ? Math.round(doneT / total * 100) : 0;
  const isRed  = ['warn','overdue','today'].includes(st);

  // 完了折り畳み
  if (st === 'done') {
    return `
    <div class="ph st-done-col" style="width:160px" onclick="openEditPhaseModal('${ph.id}')">
      <div class="ph-done-inner">
        <span class="ph-tag tag-done">完了</span>
        <div class="ph-done-name">${esc(ph.name)}</div>
        <span class="ph-pill pill-done">✓ ${doneT}/${total}</span>
      </div>
    </div>`;
  }

  // ステータスピル
  const pillMap = {
    warn:    `<span class="ph-pill pill-warn">⚠ あと${dateDiff(ph.date)}日</span>`,
    today:   `<span class="ph-pill pill-warn">⚠ 本日</span>`,
    overdue: `<span class="ph-pill pill-overdue">期限超過</span>`,
    soon:    `<span class="ph-pill pill-soon">あと${dateDiff(ph.date)}日</span>`,
    ok:      `<span class="ph-pill pill-ok">あと${dateDiff(ph.date)}日</span>`,
    nodate:  `<span class="ph-pill pill-none">日付未設定</span>`,
  };
  const pill = pillMap[st] || '';

  // 日付ブロック（目立つ表示）
  let dateBlockHTML = '';
  if (ph.date) {
    const [y,mo,d] = ph.date.split('-').map(Number);
    const dt = new Date(y, mo-1, d);
    const dow = ['日','月','火','水','木','金','土'][dt.getDay()];
    const md = `${mo}月${d}日`;
    // HH:MM形式のみ表示（"1899-12-30"など不正値は無視）
    const timeStr = /^\d{1,2}:\d{2}$/.test(ph.time||'') ? ph.time : '';
    dateBlockHTML = `<div class="ph-date-block">
      <span class="ph-date-md">${md}</span><span class="ph-date-dow">(${dow})</span>${timeStr ? `<span class="ph-date-tm">${timeStr}</span>` : ''}
    </div>`;
  }

  // 各列タスク
  function colHTML(col, cls='') {
    const colTasks = tasks.filter(t => t.col === col).sort((a,b)=>Number(a.order)-Number(b.order));
    const taskRows = colTasks.map(t => {
      const done  = isBool(t.done);
      const isPrio = isBool(t.priority);
      return `<div class="ph-task${done?' is-done':''}" data-task="${t.id}">
        <div class="chk${done?' on':isPrio?' urg':''}" onclick="toggleTask('${t.id}')">
          ${done ? '<svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20,6 9,17 4,12"/></svg>' : ''}
        </div>
        <span class="ph-tname">${esc(t.name)}</span>
        ${isPrio && !done ? '<div class="ph-prio"></div>' : ''}
        <button class="task-move-btn" onclick="openMoveTaskModal('${t.id}')" title="移動">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="5,9 2,12 5,15"/><polyline points="19,9 22,12 19,15"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
          </svg>
        </button>
      </div>`;
    }).join('');
    return `<div class="ph-grid-col ${cls}">${taskRows}</div>`;
  }

  const gridStyle = 'grid-template-columns:1fr 1fr 1fr';
  const cardWidth = 540;

  return `
  <div class="ph st-${st}" style="width:${cardWidth}px">
    <button class="ph-menu-btn" onclick="openEditPhaseModal('${ph.id}')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="5" r="1.5" fill="currentColor"/>
        <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
        <circle cx="12" cy="19" r="1.5" fill="currentColor"/>
      </svg>
    </button>
    <div class="ph-header" style="${gridStyle}">
      <div class="ph-col-h col-prep"><div class="col-lbl">準備</div></div>
      <div class="ph-col-h main col-day">
        <div class="ph-name-block">
          <div class="ph-name">${esc(ph.name)}</div>
          ${dateBlockHTML}
          ${pill}
        </div>
        <div class="col-lbl">当日</div>
      </div>
      <div class="ph-col-h col-post"><div class="col-lbl">事後</div></div>
    </div>
    <div class="ph-grid" style="${gridStyle}">
      ${colHTML('prep','col-prep')}${colHTML('day','col-day')}${colHTML('post','col-post')}
    </div>
    <div class="ph-foot">
      <span>${doneT}/${total}</span>
      <div class="foot-bar">
        <div class="foot-fill${isRed?' red':''}" style="width:${pct}%"></div>
      </div>
      <span>${pct}%</span>
      <button class="ph-add-btn" onclick="openAddTaskModal('${ph.id}','${esc(ph.prop)}')">
        <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>

    </div>
  </div>`;
}

// ═══════════════════════════════════════
// ユーティリティ
// ═══════════════════════════════════════
function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function isBool(v) { return v === true || v === 'TRUE' || v === 'true'; }

function dateDiff(d) {
  if (!d) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const [y,mo,dd] = d.split('-').map(Number);
  const target = new Date(y, mo-1, dd);
  return Math.floor((target - today) / 86400000);
}

function phaseStatus(ph) {
  const tasks  = taskData.filter(t => t.phase_id === ph.id);
  const allDone = tasks.length > 0 && tasks.every(t => isBool(t.done));
  if (!ph.date) return 'nodate';
  const diff = dateDiff(ph.date);
  if (diff < 0  && allDone) return 'done';
  if (diff < 0)             return 'overdue';
  if (diff === 0)           return 'today';
  if (diff <= Number(ph.alert_prep || 7)) return 'warn';
  if (diff <= 14)           return 'soon';
  return 'ok';
}

function phaseTagLabel(name) {
  if (name.includes('検査'))  return '検査・立会';
  if (name.includes('立会'))  return '検査・立会';
  if (name === '引渡し')      return '引渡し';
  if (name === '建て方')      return '作業';
  return '作業';
}

function fmtDate(d) {
  if (!d) return '—';
  const [,mo,dd] = d.split('-').map(Number);
  return `${mo}/${dd}`;
}

async function toggleTask(id) {
  const t = taskData.find(t => t.id === id);
  if (!t) return;
  const newDone = !isBool(t.done);
  t.done = newDone;
  // 楽観的UI更新（再レンダリング）
  renderScreen();
  try {
    await api({ mode:'updateTask', id, done: newDone });
  } catch(e) {
    t.done = !newDone; renderScreen();
    showToast('エラー: ' + e.message);
  }
}

async function saveMoveTask(taskId) {
  const t = taskData.find(t => t.id === taskId);
  if (!t) return;
  const newPhaseId = document.getElementById('f-move-phase').value;
  const newCol = getSelectedCol();
  if (newPhaseId === t.phase_id && newCol === t.col) { closeModal(); return; }
  const newProp = phaseData.find(ph => ph.id === newPhaseId)?.prop || t.prop;
  closeModal();
  try {
    await api({ mode:'moveTask', id: taskId, phase_id: newPhaseId, col: newCol, prop: newProp });
    t.phase_id = newPhaseId; t.col = newCol; t.prop = newProp;
    renderScreen();
    showToast('タスクを移動しました');
  } catch(e) { showToast('エラー: ' + e.message); }
}

function gcTimeField(id, val='') {

  </div>`;
}
function gcPick(id) {
  try { document.getElementById(id).showPicker(); }
  catch(e) { document.getElementById(id).click(); }
}
function gcFmtDate(d) {
  const [y,m,dd] = d.split('-').map(Number);
  const dt = new Date(y, m-1, dd);
  return `${y}年${m}月${dd}日（${DOW[dt.getDay()]}）`;
}
function gcUpdateDate(id) {
  const val = document.getElementById(id).value;
  const el  = document.getElementById(id+'-disp');
  if (val) { el.textContent = gcFmtDate(val); el.className = 'gc-val'; }
  else     { el.textContent = '日付を選択';   el.className = 'gc-val ph'; }
}
function gcUpdateTime(id) {
  const val = document.getElementById(id).value;

  if (val) { el.textContent = val; el.className = 'gc-val'; }

function confirmDeletePhase(phaseId) {
  const ph = phaseData.find(p => p.id === phaseId);
  if (!ph) return;
  const deletedPhase = { ...ph };
  const deletedTasks = taskData.filter(t => t.phase_id === phaseId).map(t => ({ ...t }));
  scheduleDelete(
    `「${ph.name}」`,
    () => {
      phaseData = phaseData.filter(p => p.id !== phaseId);
      taskData  = taskData.filter(t => t.phase_id !== phaseId);
    },
    () => {
      phaseData.push(deletedPhase);
      taskData.push(...deletedTasks);
      phaseData.sort((a,b) => Number(a.order)-Number(b.order));
    },
    () => api({ mode:'deletePhase', id:phaseId })
  );
}

function confirmDeleteProp(propName) {
  doDeleteProp(propName);
}

function doDeleteProp(propName) {
  const deletedProp   = propData.find(p => p.name === propName);
  const deletedPhases = phaseData.filter(ph => ph.prop === propName).map(p => ({ ...p }));
  const deletedTasks  = taskData.filter(t   => t.prop  === propName).map(t => ({ ...t }));
  scheduleDelete(
    `「${propName}」`,
    () => {
      propData  = propData.filter(p  => p.name !== propName);
      phaseData = phaseData.filter(ph => ph.prop !== propName);
      taskData  = taskData.filter(t  => t.prop  !== propName);
      if (activePropIdx >= propData.length) activePropIdx = Math.max(0, propData.length-1);
    },
    () => {
      propData.push(deletedProp);
      phaseData.push(...deletedPhases);
      taskData.push(...deletedTasks);
    },
    () => api({ mode:'deleteProperty', name:propName })
  );
}

// ── undo削除システム ──
let _undoPending = null; // { timer, restore, apiCall }

function scheduleDelete(label, localDelete, restore, apiCall) {
  // 既存のpendingがあれば即実行
  if (_undoPending) {
    clearTimeout(_undoPending.timer);
    _undoPending.apiCall();
    _undoPending = null;
  }
  localDelete();
  renderAll();
  closeModal();

  const timer = setTimeout(async () => {
    _undoPending = null;
    hideUndoToast();
    try { await apiCall(); }
    catch(e) { restore(); renderAll(); showToast('削除エラー: ' + e.message); }
  }, 5000);

  _undoPending = { timer, restore, apiCall };
  showUndoToast(label);
}

function undoDelete() {
  if (!_undoPending) return;
  clearTimeout(_undoPending.timer);
  _undoPending.restore();
  _undoPending = null;
  renderAll();
  hideUndoToast();
  showToast('削除を取り消しました');
}

function showUndoToast(label) {
  const el = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = label + 'を削除しました';
  const ub = document.getElementById('toast-undo');
  ub.style.display = '';
  // カウントバーをリセット・再アニメ
  const bar = document.getElementById('toast-bar-fill');
  bar.style.display = '';
  bar.style.animation = 'none';
  bar.offsetWidth; // reflow
  bar.style.animation = '';
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 5200);
}

function hideUndoToast() {
  document.getElementById('toast').classList.remove('show');
  document.getElementById('toast-undo').style.display = 'none';
}

function deleteTmplTask(id, phaseName) {

    () => { tmplData.push(snapshot); renderTmplPanel(); },

  );

// ── テンプレートDrag & Drop ──
let _tc = null; // ドラッグ状態

// ─ マウス（タスク） ─
function tcDragStart(e, id) {
  e.stopPropagation(); // 工程ドラッグと競合しないよう伝播を止める
  _tc = { id };
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => e.target.classList.add('tc-dragging'), 0);
}
function tcDragEnd(e) {
  e.target.classList.remove('tc-dragging');
  document.querySelectorAll('.tc-over,.tc-insert-before,.tc-insert-after')
    .forEach(el => el.classList.remove('tc-over','tc-insert-before','tc-insert-after'));
}
function tcOver(e) {
  if (!_tc) return; // タスクドラッグ中のみ処理（工程ドラッグ時はpcOverへ伝播）
  e.preventDefault();
  e.stopPropagation();
  e.currentTarget.classList.add('tc-over');
}
function tcLeave(e) {
  e.currentTarget.classList.remove('tc-over');
}
function tcDrop(e) {
  if (!_tc) return; // タスクドラッグ中のみ処理
  e.preventDefault();
  e.stopPropagation(); // 工程カードのpcDropを発火させない
  const col = e.currentTarget;
  col.classList.remove('tc-over');
  if (!_tc) return;
  // どのタスクの上にドロップしたか判定
  const tasks = [...col.querySelectorAll('.tmpl-card-task:not(.tc-dragging)')];
  let insertBeforeId = null;
  for (const t of tasks) {
    const rect = t.getBoundingClientRect();
    if (e.clientY < rect.top + rect.height / 2) {
      insertBeforeId = t.dataset.tid;
      break;
    }
  }
  tcMoveTask(_tc.id, col.dataset.phase, col.dataset.tcol, insertBeforeId);
  _tc = null;
}

// ─ タッチ ─
function tcTouchStart(e, id) {
  const el = e.currentTarget;
  const rect = el.getBoundingClientRect();
  const touch = e.touches[0];
  const ghost = el.cloneNode(true);
  Object.assign(ghost.style, {
    position:'fixed', left:rect.left+'px', top:rect.top+'px',
    width:rect.width+'px', margin:'0', pointerEvents:'none',
  });
  ghost.classList.add('tc-ghost');
  document.body.appendChild(ghost);
  el.classList.add('tc-dragging');
  _tc = {
    id, ghost, el,
    ox: touch.clientX - rect.left,
    oy: touch.clientY - rect.top,
  };
}
function tcTouchEnd(e) {
  if (!_tc?.ghost) return;
  const touch = e.changedTouches[0];
  _tc.ghost.style.display = 'none';
  const target = document.elementFromPoint(touch.clientX, touch.clientY);
  _tc.ghost.remove();
  _tc.el.classList.remove('tc-dragging');
  document.querySelectorAll('.tc-over,.tc-insert-before,.tc-insert-after')
    .forEach(el => el.classList.remove('tc-over','tc-insert-before','tc-insert-after'));
  const col = target?.closest('[data-tcol]');
  if (col) {
    // どのタスクの上にドロップしたか判定
    const tasks = [...col.querySelectorAll('.tmpl-card-task:not(.tc-dragging)')];
    let insertBeforeId = null;
    for (const t of tasks) {
      const rect = t.getBoundingClientRect();
      if (touch.clientY < rect.top + rect.height / 2) {
        insertBeforeId = t.dataset.tid;
        break;
      }
    }
    tcMoveTask(_tc.id, col.dataset.phase, col.dataset.tcol, insertBeforeId);
  }
  _tc = null;
}

// タッチ移動：documentレベルでpassive:falseで登録
document.addEventListener('touchmove', e => {
  if (!_tc?.ghost) return;
  e.preventDefault();
  const touch = e.touches[0];
  _tc.ghost.style.left = (touch.clientX - _tc.ox) + 'px';
  _tc.ghost.style.top  = (touch.clientY - _tc.oy) + 'px';
  _tc.ghost.style.display = 'none';
  const target = document.elementFromPoint(touch.clientX, touch.clientY);
  _tc.ghost.style.display = '';
  document.querySelectorAll('.tc-over').forEach(el => el.classList.remove('tc-over'));
  target?.closest('[data-tcol]')?.classList.add('tc-over');
}, { passive: false });

// ─ 移動実行（位置指定対応） ─
async function tcMoveTask(id, phaseName, col, insertBeforeId = null) {
  const task = tmplData.find(t => t.id === id);
  if (!task) return;
  const old = { phase_name: task.phase_name, col: task.col, order: task.order };

  // 移動先の既存タスク（自分以外）を順番に並べる
  const destTasks = tmplData
    .filter(t => t.phase_name === phaseName && t.col === col && t.id !== id)
    .sort((a,b) => Number(a.order) - Number(b.order));

  let newOrder;
  if (insertBeforeId) {
    const idx = destTasks.findIndex(t => t.id === insertBeforeId);
    if (idx === 0) {
      // 先頭の前に挿入
      newOrder = Number(destTasks[0].order) - 1;
    } else if (idx > 0) {
      // 2つのタスクの間に挿入
      newOrder = (Number(destTasks[idx-1].order) + Number(destTasks[idx].order)) / 2;
    } else {
      // 見つからなければ末尾
      newOrder = destTasks.length ? Number(destTasks[destTasks.length-1].order) + 1 : 1;
    }
  } else {
    // 末尾に追加
    newOrder = destTasks.length ? Number(destTasks[destTasks.length-1].order) + 1 : 1;
  }

  task.phase_name = phaseName;
  task.col = col;
  task.order = newOrder;
  renderTmplPanel();
  try {
    await api({ mode:'updateTemplate', id, phase_name: phaseName, col, order: newOrder });
    flashAutoSave();
  } catch(err) {
    Object.assign(task, old);
    renderTmplPanel();
    showToast('移動エラー: ' + err.message);
  }
}

// ═══════════════════════════════════════
// 工程ドラッグ & 並び替え
// ═══════════════════════════════════════
let _pc = null; // 工程ドラッグ状態

// ─ マウス（工程） ─
function pcDragStart(e, phaseName) {
  e.stopPropagation();
  _pc = { phaseName };
  e.dataTransfer.effectAllowed = 'move';
  // ドラッグ画像を工程カード全体に設定
  const card = e.target.closest('.tmpl-card');
  if (card) {
    e.dataTransfer.setDragImage(card, 30, 20);
    setTimeout(() => card.classList.add('pc-dragging'), 0);
  }
}
function pcDragEnd(e) {
  document.querySelectorAll('.tmpl-card.pc-dragging,.tmpl-card.pc-over')
    .forEach(el => el.classList.remove('pc-dragging','pc-over'));
  _pc = null;
}
function pcOver(e) {
  if (!_pc) return;
  e.preventDefault();
  e.currentTarget.classList.add('pc-over');
}
function pcLeave(e) {
  e.currentTarget.classList.remove('pc-over');
}
function pcDrop(e) {
  if (!_pc) return;
  e.preventDefault();
  const card = e.currentTarget;
  card.classList.remove('pc-over');
  const toPhase = card.dataset.phaseCard;
  if (!toPhase || toPhase === _pc.phaseName) { _pc = null; return; }
  pcMovePhase(_pc.phaseName, toPhase, e.clientY);
  _pc = null;
}

// ─ タッチ（工程） ─
function pcTouchStart(e, phaseName) {
  const handle = e.currentTarget;
  const card = handle.closest('.tmpl-card');
  if (!card) return;
  const rect = card.getBoundingClientRect();
  const touch = e.touches[0];
  const ghost = card.cloneNode(true);
  Object.assign(ghost.style, {
    position:'fixed', left:rect.left+'px', top:rect.top+'px',
    width:rect.width+'px', margin:'0', pointerEvents:'none',
  });
  ghost.classList.add('pc-ghost');
  document.body.appendChild(ghost);
  card.classList.add('pc-dragging');
  _pc = {
    phaseName, ghost, card,
    ox: touch.clientX - rect.left,
    oy: touch.clientY - rect.top,
  };
}
function pcTouchEnd(e) {
  if (!_pc?.ghost) return;
  const touch = e.changedTouches[0];
  _pc.ghost.style.display = 'none';
  const target = document.elementFromPoint(touch.clientX, touch.clientY);
  _pc.ghost.remove();
  _pc.card.classList.remove('pc-dragging');
  document.querySelectorAll('.tmpl-card.pc-over').forEach(el => el.classList.remove('pc-over'));
  const toCard = target?.closest('[data-phase-card]');
  if (toCard && toCard.dataset.phaseCard !== _pc.phaseName) {
    pcMovePhase(_pc.phaseName, toCard.dataset.phaseCard, touch.clientY);
  }
  _pc = null;
}

// タッチ移動（工程）
document.addEventListener('touchmove', e => {
  if (!_pc?.ghost) return;
  e.preventDefault();
  const touch = e.touches[0];
  _pc.ghost.style.left = (touch.clientX - _pc.ox) + 'px';
  _pc.ghost.style.top  = (touch.clientY - _pc.oy) + 'px';
  _pc.ghost.style.display = 'none';
  const target = document.elementFromPoint(touch.clientX, touch.clientY);
  _pc.ghost.style.display = '';
  document.querySelectorAll('.tmpl-card.pc-over').forEach(el => el.classList.remove('pc-over'));
  const card = target?.closest('[data-phase-card]');
  if (card && card.dataset.phaseCard !== _pc.phaseName) card.classList.add('pc-over');
}, { passive: false });

// ─ 工程移動実行 ─
async function pcMovePhase(fromPhase, toPhase, dropY) {
  const fromIdx = tmplPhases.indexOf(fromPhase);
  if (fromIdx === -1) return;

  // fromPhaseを除いた配列で挿入位置を決める
  const newPhases = tmplPhases.filter(p => p !== fromPhase);
  let toIdx = newPhases.indexOf(toPhase);
  if (toIdx === -1) return;

  // ドロップ位置がカードの上半分か下半分か判定
  const toCard = document.querySelector(`.tmpl-card[data-phase-card="${toPhase}"]`);
  if (toCard) {
    const rect = toCard.getBoundingClientRect();
    if (dropY > rect.top + rect.height / 2) toIdx += 1; // 下半分 → 後ろに挿入
  }

  newPhases.splice(toIdx, 0, fromPhase);
  tmplPhases = newPhases;
  renderTmplPanel();
  await saveTmplPhases();
}

  if (tmplPhases.includes(name)) { showToast('同じ工程名が既に存在します'); return; }
  tmplPhases.push(name);
  closeModal();
  document.getElementById('tmpl-overlay').classList.add('on');
  document.getElementById('tmpl-panel').classList.add('on');
  renderTmplPanel();
  showToast('工程「' + name + '」を追加しました');

function deleteTmplPhase(phaseName) {
  // 削除前スナップショット（アンドゥ用）
  const snapPhases = [...tmplPhases];
  const snapTasks  = tmplData.filter(t => t.phase_name === phaseName).map(t => ({...t}));
  const ids = snapTasks.map(t => t.id);

  scheduleDelete(
    `工程「${phaseName}」`,
    () => {
      // ローカル即時削除
      tmplPhases = tmplPhases.filter(p => p !== phaseName);
      tmplData   = tmplData.filter(t => t.phase_name !== phaseName);
      renderTmplPanel();
    },
    () => {
      // アンドゥ：フェーズとタスクを元に戻す
      tmplPhases = snapPhases;
      snapTasks.forEach(t => { if (!tmplData.find(x => x.id === t.id)) tmplData.push(t); });
      renderTmplPanel();
    },
    async () => {
      // GAS反映：工程リスト保存＋タスク削除
      await saveTmplPhases();
      for (const id of ids) await api({ mode:'deleteTemplate', id }).catch(()=>{});
    }
  );
}

async function saveTmplPhases() {
  try {
    await api({ mode: 'saveTmplPhases', phases: tmplPhases });
    flashAutoSave();
  } catch(e) {
    showToast('保存エラー: ' + e.message);
  }
}
